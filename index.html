// Helpers
const naismith = (d,dp,dm) => d + dp/100 + dm/150;
const fmtDur = m => { const h=Math.floor(m/60); let mn=Math.round(m%60); if(mn===60){return`${String(h+1).padStart(2,"0")}h00`;} return`${String(h).padStart(2,"0")}h${String(mn).padStart(2,"0")}`; };
const fmtH = (s,el) => { const t=s+el; let h=Math.floor(t/60),m=Math.round(t%60); if(m===60){h++;m=0;} h=h%24; return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`; };
const fmtPace = mpk => { const m=Math.floor(mpk),s=Math.round((mpk-m)*60); return`${m}'${String(s).padStart(2,"0")}`; };

function haversine(a,b){
  const R=6371, dLat=(b[0]-a[0])*Math.PI/180, dLon=(b[1]-a[1])*Math.PI/180;
  const s=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

function parseGPX(raw){
  if(!raw||raw.trim()==='COLLEZ_VOTRE_GPX_ICI'||raw.trim()==='') return null;
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(raw.trim(), 'application/xml');
    if(doc.querySelector('parsererror')) return null;
    const pts = doc.querySelectorAll('trkpt');
    const coords = [];
    pts.forEach(pt=>{
      const lat=parseFloat(pt.getAttribute('lat'));
      const lon=parseFloat(pt.getAttribute('lon'));
      if(!isNaN(lat)&&!isNaN(lon)) coords.push([lat,lon]);
    });
    return coords.length>10 ? coords : null;
  } catch(e){ return null; }
}

function buildCPCoords(trace){
  if(!trace||trace.length<2) return CPS_BASE.map(cp=>({...cp,lat:0,lon:0}));
  const cum=[0];
  for(let i=1;i<trace.length;i++) cum.push(cum[i-1]+haversine(trace[i-1],trace[i]));
  const total=cum[cum.length-1];
  return CPS_BASE.map(cp=>{
    const target=(cp.km/130)*total;
    let idx=0;
    for(let i=1;i<cum.length;i++){ if(cum[i]>=target){idx=i-1;break;} idx=i; }
    const i0=idx, i1=Math.min(idx+1,trace.length-1);
    const seg=cum[i1]-cum[i0];
    const t=seg>0?(target-cum[i0])/seg:0;
    return { ...cp, lat:trace[i0][0]+t*(trace[i1][0]-trace[i0][0]), lon:trace[i0][1]+t*(trace[i1][1]-trace[i0][1]) };
  });
}

  const raw = [{ ...CPS_BASE[0], el:0, heure:fmtH(start,0), pace:0, segTime:0, absTime:start }];
  segs.forEach((s,i)=>{
    const st = (s.eq/totEq)*total*fatMult(s.pos,fat);
    raw.push({ _st:st, _dist:s.dist, ...CPS_BASE[i+1] });
  });
  const norm = total / raw.slice(1).reduce((a,r)=>a+r._st,0);
  let cum=0, cumulPause=0;
  return raw.map((r,i)=>{
    if(i===0) return r;
    const prev=CPS_BASE[i-1];
    if(i>1){ if(prev.base) cumulPause+=pauseBase; else if(prev.ravito) cumulPause+=pauseRavito; }
    const st=r._st*norm; cum+=st;
    return { ...r, el:cum, heure:fmtH(start,cum+cumulPause), pace:r._dist>0?st/r._dist:0, segTime:st, absTime:start+cum+cumulPause };
  });
}

// ── Carte ──────────────────────────────────────────────────────────────────
function MapView({ passages }){
  const mapRef = React.useRef(null);
  const leafRef = React.useRef(null);
  const mkRef   = React.useRef([]);
  const cpRef   = React.useRef(null);

  React.useEffect(()=>{
    if(leafRef.current) return;
    const map = L.map(mapRef.current,{zoomControl:true}).setView([43.10,-1.39],10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OSM'}).addTo(map);

    const parsed = parseGPX(GPX_RAW);
    const trace = parsed || FALLBACK;

    const step = Math.max(1, Math.floor(trace.length/2000));
    const display = [];
    for(let i=0;i<trace.length;i+=step) display.push(trace[i]);
    if(display[display.length-1]!==trace[trace.length-1]) display.push(trace[trace.length-1]);

    L.polyline(display,{color:'#E15629',weight:3,opacity:0.9}).addTo(map);
    map.fitBounds(L.polyline(display).getBounds(),{padding:[20,20]});
    cpRef.current = buildCPCoords(trace);
    leafRef.current = map;
  },[]);

  React.useEffect(()=>{
    if(!leafRef.current||!cpRef.current||passages.length===0) return;
    mkRef.current.forEach(m=>m.remove());
    mkRef.current=[];
    cpRef.current.forEach((cp,i)=>{
      if(!cp.lat||!cp.lon) return;
      const p=passages[i]||cp;
      const isBase=cp.base, isArr=cp.arrivee, isDep=i===0;
      const color=isArr?'#E15629':isBase?'#063E3E':cp.ravito?'#388F7F':'#B1B8B6';
      const size=(cp.ravito||isDep)?15:9;
      const icon=L.divIcon({className:'',html:`<div style="width:${size}px;height:${size}px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,.5)"></div>`,iconSize:[size,size],iconAnchor:[size/2,size/2]});
      const badge=isBase?'★ BASE DE VIE':isArr?'🏁 ARRIVÉE':isDep?'🚀 DÉPART':cp.ravito?'RAVITO':'';
      const mk=L.marker([cp.lat,cp.lon],{icon});
      mk.bindPopup(`
        <div style="font-weight:700;color:#063E3E;font-size:14px">${cp.id} — ${cp.lieu}</div>
        ${badge?`<div style="font-size:10px;background:${color};color:#fff;display:inline-block;padding:1px 6px;border-radius:4px;margin-top:3px">${badge}</div>`:''}
        <div style="color:#636363;font-size:12px;margin-top:3px">${cp.km} km · D+ cumulé ${cp.dpCum}m</div>
        <div style="font-weight:700;color:#E15629;font-size:18px;margin-top:4px">${p.heure||'--:--'}</div>
        ${i>0&&p.segTime?`<div style="color:#636363;font-size:12px;margin-top:2px">Section : ${fmtDur(p.segTime)} · ${fmtPace(p.pace)}/km</div>`:''}
        ${i>0?`<div style="font-size:11px;color:#388F7F;margin-top:2px">↑ ${cp.dpSeg}m · ↓ ${cp.dmSeg}m </div>`:''}
      `);
      mk.addTo(leafRef.current);
      mkRef.current.push(mk);
    });
  },[passages]);

  return <div id="map" ref={mapRef}/>;
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [dH,setDH]=React.useState(5), [dM,setDM]=React.useState(0);
  const [tH,setTH]=React.useState(24),[tM,setTM]=React.useState(0);
  const [fat,setFat]=React.useState(1.3);
  const [pauseRavito,setPauseRavito]=React.useState(3);
  const [pauseBase,setPauseBase]=React.useState(30);
  const [tab,setTab]=React.useState('carte');
  const start=dH*60+dM, total=tH*60+tM;
  const totalPause=CPS_BASE.slice(1,-1).reduce((acc,cp)=>acc+(cp.base?pauseBase:cp.ravito?pauseRavito:0),0);
  const runTime=Math.max(0,total-totalPause);
  const passages=React.useMemo(()=>computePassages(start,runTime,fat,pauseRavito,pauseBase),[start,runTime,fat,pauseRavito,pauseBase]);
  const fatLabel=fat<=1.1?"Très régulier":fat<=1.3?"Légère dégradation":fat<=1.6?"Dégradation modérée":"Forte dégradation";
  const inp={width:52,padding:"6px 4px",borderRadius:6,border:"2px solid #DFD6C9",fontSize:18,textAlign:"center",color:"#063E3E",fontWeight:700,background:"#fff",outline:"none"};

  return(
    <div style={{maxWidth:480,margin:"0 auto",padding:"12px 12px 32px"}}>

      <div style={{background:"#063E3E",borderRadius:14,padding:"18px 20px",marginBottom:14,color:"#fff"}}>
        <div style={{fontSize:10,letterSpacing:2,color:"#388F7F",textTransform:"uppercase",marginBottom:3}}>Euskal Trail 2026</div>
        <div style={{fontSize:20,fontWeight:700,lineHeight:1.2}}>Ultra Solo 130 km · 7 790 m+</div>
        <div style={{fontSize:12,color:"#DFD6C9",marginTop:4}}>Prédicteur de passage</div>
      </div>

      <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:14,boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#063E3E",marginBottom:14,textTransform:"uppercase",letterSpacing:1}}>Paramètres</div>
        <div style={{display:"flex",gap:12,marginBottom:18}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"#636363",marginBottom:7}}>Heure de départ</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <input type="number" min={0} max={23} value={dH} onChange={e=>setDH(+e.target.value)} style={inp}/>
              <span style={{fontWeight:700,color:"#636363",fontSize:18}}>:</span>
              <input type="number" min={0} max={59} value={dM} onChange={e=>setDM(+e.target.value)} style={inp}/>
            </div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"#636363",marginBottom:7}}>Temps total estimé</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <input type="number" min={10} max={60} value={tH} onChange={e=>setTH(+e.target.value)} style={inp}/>
              <span style={{fontSize:12,color:"#636363"}}>h</span>
              <input type="number" min={0} max={59} value={tM} onChange={e=>setTM(+e.target.value)} style={inp}/>
              <span style={{fontSize:12,color:"#636363"}}>mn</span>
            </div>
          </div>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
            <span style={{fontSize:11,color:"#636363"}}>Coefficient de fatigue</span>
            <span style={{fontSize:15,fontWeight:700,color:"#E15629"}}>×{fat.toFixed(2)}</span>
          </div>
          <input type="range" min={1.0} max={2.0} step={0.05} value={fat} onChange={e=>setFat(+e.target.value)}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#B1B8B6",marginTop:4}}>
            <span>Régulier</span>
            <span style={{color:"#E15629",fontWeight:600}}>{fatLabel}</span>
            <span>Forte dégradation</span>
          </div>
        </div>
        <div style={{display:"flex",gap:12,marginTop:14}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"#636363",marginBottom:7}}>Pause ravito</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <input type="number" min={0} max={60} value={pauseRavito} onChange={e=>setPauseRavito(Math.max(0,+e.target.value))} style={inp}/>
              <span style={{fontSize:12,color:"#636363"}}>mn</span>
            </div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"#636363",marginBottom:7}}>Pause base de vie</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <input type="number" min={0} max={120} value={pauseBase} onChange={e=>setPauseBase(Math.max(0,+e.target.value))} style={inp}/>
              <span style={{fontSize:12,color:"#636363"}}>mn</span>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",justifyContent:"flex-end",alignItems:"center",paddingBottom:2}}>
            <div style={{fontSize:10,color:"#636363",marginBottom:3}}>Total pauses</div>
            <div style={{fontSize:15,fontWeight:700,color:"#063E3E"}}>{fmtDur(totalPause)}</div>
          </div>
        </div>
      </div>

      {passages.length>0&&(
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[
            {label:"Départ",  val:passages[0].heure,               bg:"#f0f8f7",color:"#063E3E"},
            {label:"Arrivée", val:passages[passages.length-1].heure,bg:"#fff8f5",color:"#E15629"},
            {label:"Durée",   val:fmtDur(total),                   bg:"#f5f2ed",color:"#063E3E"},
            {label:"Allure moy.", val:total>0?fmtPace(total/130)+"/km":"--", bg:"#f0f4f0",color:"#388F7F"},
          ].map((c,i)=>(
            <div key={i} style={{flex:1,background:c.bg,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#636363",marginBottom:3}}>{c.label}</div>
              <div style={{fontSize:17,fontWeight:700,color:c.color}}>{c.val}</div>
            </div>
          ))}
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:12,background:"#f0ece6",borderRadius:12,padding:4}}>
        {[{id:'carte',label:'🗺 Carte'},{id:'liste',label:'📋 Passages'}].map(t=>(
          <button key={t.id} className={`tab-btn${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
      </div>

      {tab==='carte'&&(
        <div style={{background:"#fff",borderRadius:14,padding:12,boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
          <MapView passages={passages}/>
          <div style={{display:"flex",flexWrap:"wrap",gap:"8px 16px",marginTop:10,fontSize:11,color:"#636363"}}>
            {[
              {color:"#E15629",label:"Tracé / Arrivée"},
              {color:"#063E3E",label:"Base de vie"},
              {color:"#388F7F",label:"Ravitaillement"},
              {color:"#B1B8B6",label:"CP sans ravito"},
            ].map((l,i)=>(
              <span key={i} style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{width:10,height:10,borderRadius:"50%",background:l.color,display:"inline-block"}}/>
                {l.label}
              </span>
            ))}
          </div>
          {!parseGPX(GPX_RAW)&&(
            <div style={{fontSize:11,color:"#B1B8B6",marginTop:8,textAlign:"center",padding:"6px 10px",background:"#f5f2ed",borderRadius:8}}>
              ℹ️ Tracé de secours — collez votre GPX dans <code>GPX_RAW</code> en haut du fichier HTML
            </div>
          )}
        </div>
      )}

      {tab==='liste'&&(
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {passages.map((p,i)=>{
            const isBase=p.base, isArr=p.arrivee;
            const bc=isArr?"#E15629":isBase?"#063E3E":p.ravito?"#388F7F":"#e0e0e0";
            const bg=isArr?"#fff8f5":isBase?"#e8f4f2":p.ravito?"#fff":"#f7f7f7";
            const tod=p.absTime%(24*60), dnColor=tod>=SUNRISE&&tod<=SUNSET?"#FFC107":"#1E3A5F";
            return(
              <div key={i} style={{background:bg,borderRadius:10,padding:"10px 14px",borderLeft:`4px solid ${bc}`,borderRight:`4px solid ${dnColor}`,opacity:p.ravito?1:0.75}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                      <span style={{fontSize:10,color:"#B1B8B6",fontWeight:600}}>{p.id}</span>
                      {isBase&&<span style={{fontSize:9,background:"#063E3E",color:"#fff",borderRadius:4,padding:"1px 5px",fontWeight:700}}>BASE DE VIE</span>}
                      {isArr &&<span style={{fontSize:9,background:"#E15629",color:"#fff",borderRadius:4,padding:"1px 5px",fontWeight:700}}>ARRIVÉE</span>}
                      {p.ravito&&!isBase&&!isArr&&<span style={{fontSize:9,background:"#388F7F",color:"#fff",borderRadius:4,padding:"1px 5px"}}>RAVITO</span>}
                    </div>
                    <div style={{fontSize:15,fontWeight:p.ravito?700:400,color:isArr?"#E15629":isBase?"#063E3E":p.ravito?"#222":"#aaa"}}>{p.lieu}</div>
                    <div style={{fontSize:11,color:"#636363",marginTop:2}}>{p.km} km · D+ cumulé {p.dpCum} m</div>
                  </div>
                  <div style={{textAlign:"right",marginLeft:12,flexShrink:0}}>
                    <div style={{fontSize:22,fontWeight:700,color:isArr?"#E15629":"#063E3E",lineHeight:1}}>{p.heure}</div>
                    {i>0&&<div style={{fontSize:11,color:"#388F7F",fontWeight:600,marginTop:3}}>{fmtDur(p.segTime)}</div>}
                  </div>
                </div>
                {i>0&&(
                  <div style={{display:"flex",gap:12,marginTop:8,paddingTop:8,borderTop:"1px solid #eee",fontSize:11}}>
                    <span style={{color:"#388F7F"}}>↑ {p.dpSeg}m</span>
                    <span style={{color:"#E15629"}}>↓ {p.dmSeg}m</span>
                    <span style={{color:"#636363",marginLeft:"auto"}}>{fmtPace(p.pace)}/km</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      <div style={{textAlign:"center",fontSize:10,color:"#B1B8B6",marginTop:20}}>
        Naismith · D+ 100m/km eq · D− 150m/km eq
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
